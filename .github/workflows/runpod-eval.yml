name: RunPod Eval

on:
  workflow_dispatch:
    inputs:
      hf_adapter_repo:
        description: Hugging Face repo id that contains cpt-lora/ and optional sft-lora/
        required: true
      dry_run:
        description: Print the RunPod payload without creating a pod
        required: false
        default: "false"

jobs:
  launch-eval:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Launch evaluation pod
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_ADAPTER_REPO: ${{ github.event.inputs.hf_adapter_repo }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: unoa-eng/dalbitalba-train-data
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          BASE_MODEL: ${{ vars.BASE_MODEL }}
          GPU_TYPE: ${{ vars.GPU_TYPE }}
          CONTAINER_IMAGE: ${{ vars.CONTAINER_IMAGE }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python scripts/launch_eval_pod.py --dry-run
          else
            python scripts/launch_eval_pod.py
          fi

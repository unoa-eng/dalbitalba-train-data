name: RunPod Eval

on:
  workflow_dispatch:
    inputs:
      hf_adapter_repo:
        description: Hugging Face SFT adapter repo id for phase6, or legacy combined repo
        required: false
        default: ""
      hf_cpt_repo:
        description: Optional Hugging Face CPT adapter repo id used before the SFT adapter
        required: false
        default: ""
      eval_mode:
        description: phase6 or legacy
        required: false
        default: "phase6"
      dry_run:
        description: Print the RunPod payload without creating a pod
        required: false
        default: "false"

jobs:
  launch-eval:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Launch evaluation pod
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_ADAPTER_REPO: ${{ github.event.inputs.hf_adapter_repo }}
          SFT_ADAPTER_REPO: ${{ github.event.inputs.hf_adapter_repo }}
          CPT_ADAPTER_REPO: ${{ github.event.inputs.hf_cpt_repo }}
          EVAL_MODE: ${{ github.event.inputs.eval_mode }}
          GITHUB_TOKEN: ${{ secrets.TRAIN_REPO_PUSH_TOKEN }}
          GITHUB_REPO: unoa-eng/dalbitalba-train-data
          TRAIN_GITHUB_REF: ${{ github.ref_name }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          BASE_MODEL: Qwen/Qwen3-8B-Base
          GPU_TYPE: NVIDIA L40S,NVIDIA A100 80GB PCIe,NVIDIA RTX 6000 Ada Generation
          CONTAINER_IMAGE: runpod/pytorch:2.4.0-py3.11-cuda12.4.1-devel-ubuntu22.04
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python scripts/launch_eval_pod.py --dry-run
          else
            python scripts/launch_eval_pod.py
          fi

name: RunPod Train

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Print the RunPod payload without creating a pod
        required: false
        default: "false"
      smoke:
        description: Load recipes/smoke.env for a short end-to-end plumbing run
        required: false
        default: "false"
      profile:
        description: "Optional recipe profile: budget30"
        required: false
        default: "none"

jobs:
  launch-train:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install local verifier dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "transformers>=4.51.3,<5" \
            "tokenizers>=0.21,<0.22" \
            "sentencepiece" \
            "tiktoken>=0.7.0" \
            "protobuf"

      - name: Launch training pod
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          GITHUB_TOKEN: ${{ secrets.TRAIN_REPO_PUSH_TOKEN }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          GITHUB_REPO: unoa-eng/dalbitalba-train-data
          TRAIN_GITHUB_REF: ${{ github.ref_name }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          BASE_MODEL: Qwen/Qwen3-8B-Base
          GPU_TYPE: NVIDIA L40S,NVIDIA A100 80GB PCIe,NVIDIA RTX 6000 Ada Generation
          CONTAINER_IMAGE: runpod/pytorch:2.4.0-py3.11-cuda12.4.1-devel-ubuntu22.04
        run: |
          if [ "${{ github.event.inputs.smoke }}" = "true" ]; then
            set -a
            . recipes/smoke.env
            set +a
          elif [ "${{ github.event.inputs.profile }}" = "budget30" ]; then
            set -a
            . recipes/budget30.env
            set +a
          fi
          python scripts/local_verification_loop.py --strict --profile "${BUDGET_PROFILE:-default}"
          if [ "${{ github.event.inputs.profile }}" = "budget30" ] && [ "${{ github.event.inputs.dry_run }}" != "true" ]; then
            python scripts/check_smoke_promotion.py --require-sft
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python scripts/launch_train_pod.py --dry-run
          else
            python scripts/launch_train_pod.py
          fi
